<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özür Dilerim Abla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slides-container">
        <div class="slide active">
            <h1>Abla, Doğum Gününü Unuttum...</h1>
            <p>Biliyorum, ne desen haklısın.</p>
        </div>
        <div class="slide">
            <h1>Ben Tam Bir Eşeğim 🐴</h1>
            <p>Nasıl unutabildim aklım almıyor.</p>
            <img src="https://media.tenor.com/7bQe2jX2k3UAAAAC/donkey-shrek.gif" alt="Eşek" style="max-width: 250px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        </div>
        <div class="slide">
            <h1>Ben Malım 🤦‍♂️</h1>
            <p>Dünyanın en kötü kardeşi ödülü bana gelsin.</p>
            <img src="https://media.tenor.com/P4WfIeC2qKcAAAAC/mr-bean-facepalm.gif" alt="Aptal" style="max-width: 250px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        </div>
        <div class="slide">
            <h1>Lütfen Beni Affet! 🙏</h1>
            <p>Seni çok seviyorum. Gecikmeli de olsa, İyi Ki Doğdun! ❤️</p>
            <img src="https://media.tenor.com/2cR3B5J2lFEAAAAC/im-sorry-puppy.gif" alt="Özür" style="max-width: 250px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        </div>
    </div>
    
    <div class="controls">
        <button id="prevBtn">Önceki</button>
        <button id="nextBtn">Sonraki</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
