<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özür Dilerim Abla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slides-container">
        <div class="slide active">
            <h1>Abla, Doğum Gününü Unuttum...</h1>
            <p>Biliyorum, ne desen haklısın.</p>
        </div>
        <div class="slide">
            <h1>Ben Tam Bir Eşeğim 🐴</h1>
            <p>Nasıl unutabildim aklım almıyor.</p>
        </div>
        <div class="slide">
            <h1>Ben Malım 🤦‍♂️</h1>
            <p>Dünyanın en kötü kardeşi ödülü bana gelsin.</p>
        </div>
        <div class="slide">
            <h1>Lütfen Beni Affet! 🙏</h1>
            <p>Seni çok seviyorum. Gecikmeli de olsa, İyi Ki Doğdun! ❤️</p>
        </div>
    </div>
    
    <div class="controls">
        <button id="prevBtn">Önceki</button>
        <button id="nextBtn">Sonraki</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
